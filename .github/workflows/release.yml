name: Auto Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Version
        id: plugin-version
        run: |
          VERSION=$(grep -oP "Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+" wp-user-audit-cleanup.php)
          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check-tag
        uses: mukunku/tag-exists-action@v1.4.0
        with:
          tag: 'v${{ steps.plugin-version.outputs.version }}'

      - name: Auto-Bump Version
        if: steps.check-tag.outputs.exists == 'true'
        run: |
          CURRENT_VERSION="${{ steps.plugin-version.outputs.version }}"
          echo "Tag v$CURRENT_VERSION exists. Auto-bumping..."

          # Increment patch version
          IFS='.' read -r -a parts <<< "$CURRENT_VERSION"
          major="${parts[0]}"
          minor="${parts[1]}"
          patch="${parts[2]}"
          new_patch=$((patch + 1))
          NEW_VERSION="$major.$minor.$new_patch"
          echo "New Version: $NEW_VERSION"

          # Update plugin header
          sed -i "s/Version: $CURRENT_VERSION/Version: $NEW_VERSION/" wp-user-audit-cleanup.php

          # Update WUAC_VERSION constant
          sed -i "s/define( 'WUAC_VERSION', '$CURRENT_VERSION' );/define( 'WUAC_VERSION', '$NEW_VERSION' );/" wp-user-audit-cleanup.php

          # Update readme.txt stable tag
          sed -i "s/Stable tag: $CURRENT_VERSION/Stable tag: $NEW_VERSION/" readme.txt

          # Commit and push
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add wp-user-audit-cleanup.php readme.txt
          git commit -m "chore: auto-bump version to $NEW_VERSION"
          git push origin main

          echo "Bumped to $NEW_VERSION and pushed. New workflow will trigger."

      - name: Create ZIP
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          mkdir -p wp-user-audit-cleanup
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.vscode' \
            --exclude='.idea' \
            --exclude='README.md' \
            --exclude='TECHNICAL-DETAILS.md' \
            ./ wp-user-audit-cleanup/
          zip -r wp-user-audit-cleanup.zip wp-user-audit-cleanup/

      - name: Create Release
        if: steps.check-tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.plugin-version.outputs.version }}
          name: v${{ steps.plugin-version.outputs.version }}
          files: wp-user-audit-cleanup.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
